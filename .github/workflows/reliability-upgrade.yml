name: Reliability Upgrade

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  reliability:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and test deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run regression tests
        shell: pwsh
        run: |
          python -m pytest -q

      - name: Run reliability checklist
        shell: pwsh
        run: |
          python tools/reliability_check.py
